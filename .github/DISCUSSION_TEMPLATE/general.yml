    attributes:
      value: |
        Use this category for questions about **AIGov Core** — the open-source ledger-authoritative audit runtime (`aigov_audit`).

        - Runtime quickstart: [docs/quickstart-runtime.md](../../docs/quickstart-runtime.md)
        - Reference integrations: [docs/reference-integrations.md](../../docs/reference-integrations.md)

        For security vulnerabilities, use [GitHub Security Advisories](https://github.com/MonikaDvorackova/aigov-core/security/advisories/new), not public discussions.
  - type: textarea
    id: body
    attributes:
      label: Your question or topic
      description: What are you trying to accomplish with AIGov Core?
    validations:
      required: true
