# GovAI Core CI: portable runtime / evidence infrastructure (no hosted HTTP audit server).
# Hosted SaaS lifecycle (GET /ready, background audit service) belongs to the GovAI Platform repo.

name: govai-ci

on:
  pull_request:
    branches: [main, staging]

env:
  AIGOV_POLICY_STRICT: "true"

jobs:
  govai-core-portable:
    name: govai-core-portable
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install GovAI from workspace
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -e "./python[dev]"
          govai --help >/dev/null

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build audit runtime and portable digest helper
        run: |
          set -euo pipefail
          cd rust
          cargo build --locked --bin aigov_audit
          cargo build --locked --bin portable_evidence_digest_once

      - name: Rust unit and integration tests
        run: |
          set -euo pipefail
          cd rust && cargo test --locked

      - name: Governance standards (offline)
        run: |
          set -euo pipefail
          make governance-standards-check

      - name: Documentation gate
        run: |
          set -euo pipefail
          make gate

      - name: Core runtime example route contract
        run: |
          set -euo pipefail
          make core-runtime-examples-check

      - name: Reference integrations contract
        run: |
          set -euo pipefail
          make reference-integrations-check

      - name: Reconstructible agent demo contract
        run: |
          set -euo pipefail
          make reconstructible-demo-check

      - name: Portable evidence digest unit tests
        run: |
          set -euo pipefail
          cd python && python -m pytest tests/test_portable_evidence_digest.py tests/test_evidence_pack_init_cli.py -q

      - name: Portable artifact bundle smoke (offline)
        run: |
          set -euo pipefail
          RUN_ID="govai-ci-portable-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          ART="${RUNNER_TEMP}/govai-ci-artifacts"
          rm -rf "${ART}"
          mkdir -p "${ART}"
          python3 scripts/ci_portable_artifact_bundle.py \
            --run-id "${RUN_ID}" \
            --artifact-dir "${ART}"
          govai verify-evidence-pack --portable-only --path "${ART}" --run-id "${RUN_ID}"

      - name: Write job summary
        if: always()
        run: |
          set -euo pipefail
          {
            echo "# GovAI Core portable CI"
            echo
            echo "Validates \`aigov_audit\` build, Rust tests (including in-process HTTP integration), offline governance standards, documentation gate, and portable evidence/digest/replay semantics."
            echo
            echo "Does **not** start a long-lived localhost server in CI (integration tests use Axum TestClient)."
            echo "Hosted runtime orchestration is owned by the **GovAI Platform** repository."
          } >> "${GITHUB_STEP_SUMMARY}"
