# AIGov Core OSS developer experience: scripts that exist in this repository only.
# Platform-wide validators (commercial, hosted, regulatory, and similar) live in the proprietary platform repository.

name: oss-developer-experience

on:
  pull_request:
    branches: [main, staging]
  workflow_dispatch:

jobs:
  oss-developer-experience-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python package
        working-directory: python
        run: |
          set -euo pipefail
          python -m venv .venv
          . .venv/bin/activate
          pip install -U pip
          pip install -e ".[dev]"

      - name: Cursor plugin bundle (validate + smoke)
        run: |
          set -euo pipefail
          make cursor-plugin-check

      - name: Public SDK packages check
        run: |
          set -euo pipefail
          mkdir -p .oss-ci-out
          make public-sdk-packages-check
          python3 scripts/public_sdk_packages_check.py --json > .oss-ci-out/public-sdk-packages.json

      - name: Core readiness (gate + runtime contracts + benchmark)
        run: |
          set -euo pipefail
          make enterprise-readiness-check

      - name: Upload OSS check JSON artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: oss-check-json
          path: .oss-ci-out/
