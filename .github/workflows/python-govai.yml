name: python-govai

on:
  pull_request:
    branches: [main, staging]
    paths:
      - "python/**"
      - "scripts/**"
      - ".github/workflows/python-govai.yml"
  push:
    branches: [main, staging]
    paths:
      - "python/**"
      - "scripts/**"
      - ".github/workflows/python-govai.yml"
  workflow_dispatch:

jobs:
  python-smoke:
    name: python-smoke
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install package
        working-directory: python
        run: |
          set -euo pipefail
          python -m venv .venv
          . .venv/bin/activate
          pip install -U pip
          pip install -e ".[dev]"

      - name: Python smoke tests
        working-directory: python
        run: |
          set -euo pipefail
          . .venv/bin/activate
          python -m pytest tests/test_standards_conformance.py -q

      - name: Write Python smoke summary
        if: always()
        run: |
          set -euo pipefail
          {
            echo "# GovAI Python smoke"
            echo
            echo "Status: ${{ job.status }}"
            echo "Full Python pytest runs in nightly-full-validation and release-validation."
          } >> "${GITHUB_STEP_SUMMARY}"
