name: release-validation

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/**"
      - "rust/**"
      - "python/**"
      - "scripts/**"
      - "typescript-sdk/**"
      - "dashboard/**"
      - "docs/**"
      - "Makefile"
      - "CHANGELOG.md"
      - "Dockerfile"
  workflow_dispatch:
  push:
    tags:
      - "v*"

env:
  AIGOV_POLICY_STRICT: "true"

jobs:
  release-validation:
    name: release-validation
    runs-on: ubuntu-latest
    timeout-minutes: 150

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/postgres

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust -> target

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install Python package
        working-directory: python
        run: |
          set -euo pipefail
          python -m venv .venv
          . .venv/bin/activate
          pip install -U pip
          pip install -e ".[dev]"

      - name: Core gate
        run: |
          set -euo pipefail
          make gate

      - name: Release metadata validation
        run: |
          set -euo pipefail
          python3 scripts/validate_changelog.py --json | tee changelog-validation.json
          python3 scripts/release_readiness_report.py --json | tee release-readiness-report.json

      - name: Full Rust tests
        run: |
          set -euo pipefail
          cd rust
          cargo test --all --locked -- --test-threads=1

      - name: Full Python tests
        working-directory: python
        timeout-minutes: 120
        run: |
          set -euo pipefail
          . .venv/bin/activate
          python -m pytest -q

      - name: Enterprise readiness
        run: |
          set -euo pipefail
          make enterprise-readiness-check

      - name: Write release validation summary
        if: always()
        run: |
          set -euo pipefail
          {
            echo "# GovAI release validation"
            echo
            echo "Status: ${{ job.status }}"
            echo "Repository: ${{ github.repository }}"
            echo "Branch: ${{ github.ref_name }}"
            echo "Run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            echo
            echo "Executed checks:"
            echo
            echo "1. Core gate"
            echo "2. Full Rust test suite"
            echo "3. Full Python test suite"
            echo "4. Enterprise readiness check"
            echo "5. TypeScript SDK build and tests"
          } >> "${GITHUB_STEP_SUMMARY}"

  release-artifacts:
    name: release-artifacts
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust -> target

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Release readiness (dry-run)
        run: |
          set -euo pipefail
          make release-readiness-check
          python3 scripts/validate_changelog.py --json | tee changelog-validation.json
          python3 scripts/release_readiness_report.py --json | tee release-readiness-report.json
          mkdir -p dist

      - name: Build Python wheel and sdist
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip build
          mkdir -p dist/python
          python -m build --outdir dist/python python
          ls -la dist/python

      - name: Validate Rust crate package (no publish)
        working-directory: rust
        run: |
          set -euo pipefail
          cargo package --allow-dirty --no-verify
          mkdir -p ../dist/rust
          cp target/package/aigov_audit-*.crate ../dist/rust/
          ls -la ../dist/rust

      - name: Build Docker image (local artifact only)
        run: |
          set -euo pipefail
          docker build -t aigov-core:ci-${{ github.sha }} .
          docker save aigov-core:ci-${{ github.sha }} -o dist/aigov-core-image.tar

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: aigov-core-release-artifacts
          path: |
            dist/python/
            dist/rust/
            dist/aigov-core-image.tar
            changelog-validation.json
            release-readiness-report.json
          if-no-files-found: error
