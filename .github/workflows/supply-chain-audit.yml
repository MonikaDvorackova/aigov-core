name: supply-chain-audit

permissions:
  contents: read

on:
  pull_request:
    branches: [main, staging]
  workflow_dispatch:
  schedule:
    - cron: "30 3 * * 1"

jobs:
  dependabot-config:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate Dependabot targets staging
        run: make dependabot-config-check

  cargo-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: |
          set -euo pipefail
          export CARGO_HTTP_MULTIPLEXING=false
          for attempt in 1 2 3; do
            cargo install cargo-audit --locked && break
            if [ "$attempt" = "3" ]; then
              exit 1
            fi
            sleep 10
          done
          cargo audit --version

      - name: cargo audit
        working-directory: rust
        run: cargo audit

  pip-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install project dependencies
        working-directory: python
        run: |
          set -euo pipefail
          python -m venv .venv
          . .venv/bin/activate
          pip install -U pip
          pip install -e ".[dev]"

      - name: pip-audit
        working-directory: python
        run: |
          set -euo pipefail
          . .venv/bin/activate
          pip install pip-audit
          pip-audit
