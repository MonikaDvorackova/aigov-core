components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: |
        API key used to resolve the ledger tenant (API key → tenant mapping).

        - Hosted / multi-tenant: use `GOVAI_API_KEYS_JSON` mapping.
        - Dev / simple: `GOVAI_API_KEYS` may be used as a shortcut.
        - When keys are unset/empty, some deployments may accept unauthenticated requests (local default).
    supabaseJWT:
      type: http
      scheme: bearer
      description: Supabase-issued JWT.

  schemas:
    RootResponse:
      type: object
      required: [ok, service, version]
      properties:
        ok:
          type: boolean
          enum: [true]
        service:
          type: string
          example: govai
        version:
          type: string
          description: Rust crate / binary version string

    HealthResponse:
      type: object
      required: [ok]
      properties:
        ok:
          type: boolean
          enum: [true]

    ReadyResponseOk:
      type: object
      additionalProperties: false
      description: Successful readiness probe (dependencies satisfied).
      required: [ok, ready, checks, runtime_governance_enforcement]
      properties:
        ok:
          type: boolean
          enum: [true]
        ready:
          type: boolean
          enum: [true]
        checks:
          type: object
          additionalProperties: false
          required:
            [database_ping, migrations_complete, ledger_writable, tenant_ledger_probe]
          properties:
            database_ping:
              type: boolean
            migrations_complete:
              type: boolean
            ledger_writable:
              type: boolean
            tenant_ledger_probe:
              type: boolean
        runtime_governance_enforcement:
          $ref: "#/components/schemas/RuntimeGovernanceEnforcementDiag"

    RuntimeGovernanceEnforcementDiag:
      type: object
      additionalProperties: false
      description: Phase 3 operator diagnostics surfaced on **`GET /ready`** and **`GET /status`** (env-derived; never trusts client tenant headers).
      required:
        - mode
        - configured_mode
        - tenant_allowlist_configured
        - enforceable
        - reason_if_not_enforceable
      properties:
        mode:
          type: string
          enum: [off, shadow, enforced]
        configured_mode:
          type: string
          enum: [off, shadow, enforced]
          description: Normalized **`GOVAI_RUNTIME_GOVERNANCE_ENFORCEMENT`** (`off` if missing/invalid).
        tenant_allowlist_configured:
          type: boolean
          description: True when **`GOVAI_RUNTIME_GOVERNANCE_ENFORCEMENT_TENANTS`** contains at least one non-empty trimmed ID after splitting on commas.
        enforceable:
          type: boolean
          description: True iff **`configured_mode=enforced`** and **`tenant_allowlist_configured=true`** — operator signal only; unrelated to **`GET /ready`** HTTP status codes.
        reason_if_not_enforceable:
          type: string
          nullable: true
          description: Machine-oriented reason string when **`enforceable`** is false; JSON **`null`** when enforceable.

    StatusResponse:
      type: object
      required: [ok, policy_version, environment]
      properties:
        ok:
          type: boolean
          enum: [true]
        policy_version:
          type: string
        environment:
          type: string
          description: "`dev` | `staging` | `prod`"
        base_url:
          type: string
          nullable: true
          description: Canonical public audit URL when `GOVAI_BASE_URL` / `AIGOV_BASE_URL` is configured.
        runtime_governance_enforcement:
          $ref: "#/components/schemas/RuntimeGovernanceEnforcementDiag"

    PricingResponse:
      type: object
      required: [units, definitions, plans]
      properties:
        units:
          type: object
          required: [primary, secondary]
          properties:
            primary:
              type: string
              enum: [evidence_event]
            secondary:
              type: string
              enum: [run]
        definitions:
          type: object
          required: [evidence_event, run]
          properties:
            evidence_event:
              type: string
            run:
              type: string
        plans:
          type: array
          items:
            $ref: "#/components/schemas/PricingPlan"

    PricingPlan:
      type: object
      required: [name, evidence_events_per_month, runs_per_month, events_per_run]
      properties:
        name:
          type: string
          enum: [free, pro, team]
        evidence_events_per_month:
          type: integer
        runs_per_month:
          type: integer
        events_per_run:
          type: integer

    EvidenceEvent:
      type: object
      required: [event_id, event_type, ts_utc, actor, system, run_id, payload]
      properties:
        event_id:
          type: string
        event_type:
          type: string
        ts_utc:
          type: string
        actor:
          type: string
        system:
          type: string
        run_id:
          type: string
        environment:
          type: string
          description: Optional on ingest; server may stamp/replace per deployment tier.
        payload:
          description: Event-specific JSON object (`rust/src/policy.rs` enforced types).
          type: object
          additionalProperties: true

    EvidenceIngestSuccess:
      type: object
      required: [ok, record_hash, policy_version, environment]
      properties:
        ok:
          type: boolean
          enum: [true]
        record_hash:
          type: string
        policy_version:
          type: string
        environment:
          type: string
        team_id:
          type: string
          description: Present when `GOVAI_METERING=on`.
        plan:
          type: string
          description: "`free` | `team` | `growth` | `enterprise` when metering on."
        year_month:
          type: string
          description: "`YYYY-MM` when metering on."
        run:
          type: object
          description: Run counters when metering on.
          additionalProperties: true
        warnings:
          type: array
          items: {}
          description: Advisory strings when metering on.

    EvidenceIngestError:
      type: object
      required: [ok, error, code, message]
      properties:
        ok:
          type: boolean
          enum: [false]
        error:
          type: string
          description: Machine-readable error category or code.
        code:
          type: string
          description: More specific machine-readable discriminator. Usually equals `error`; for `policy_violation`, this is the policy rule code.
        message:
          type: string
          description: Human-friendly explanation intended for end users.
        policy_version:
          type: string
        details:
          type: string
        metering:
          type: string
          description: "`on` | `off` for plan quotas; `n/a` for per-key request cap only."
        count_kind:
          type: string
          description: "What `used`/`limit` refer to, e.g. `evidence_events`, `new_runs_month`, `api_key_total_requests`."
        tenant_id:
          type: string
          description: Legacy quota scope when `metering=off`.
        team_id:
          type: string
          description: Team scope when `metering=on`.
        plan:
          type: string
        period_start:
          type: string
        used:
          type: integer
        limit:
          type: integer
        year_month:
          type: integer
        run_id:
          type: string
        event_count:
          type: integer

    SimpleOkFalse:
      type: object
      required: [ok, error, code, message]
      properties:
        ok:
          type: boolean
          enum: [false]
        error:
          type: string
        code:
          type: string
        message:
          type: string
        policy_version:
          type: string

    RuntimeControlEvaluation:
      type: object
      required: [control_id, status, source, reason_codes]
      additionalProperties: false
      description: |
        Structured control-level outcome for runtime evaluate (Phase 3 M7.2–M7.8).

        Top-level **`control_evaluations`** rows use **`source: runtime_mode`** (stub). Additional merged rows contributing to **`governance_summary.control_evaluations`** (lineage/context/mapping sentinels) may use other **`source`** strings. **`governance_summary.advisory_control_evaluations`** rows use **`source: capability_shadow`** (Phase 4 M3); they are **advisory only** and do **not** feed merged-summary verdict logic or HTTP verdict. **`FAIL`** statuses in **`control_evaluations`** can influence **`governance_summary.verdict`**; top-level **`verdict`** elevations occur only under allowlisted **`enforced`** (**`GOVAI_RUNTIME_GOVERNANCE_ENFORCEMENT`**) — see **`governance_summary.enforced`**.
      properties:
        control_id:
          type: string
          description: Stable governance control identifier.
        status:
          type: string
          enum: [PASS, FAIL, WARN, NOT_APPLICABLE]
          description: Control outcome (advisory for preview runtime; does not override HTTP verdict).
        source:
          type: string
          description: Evaluation origin (e.g. `runtime_mode` for stub mappings).
        reason_codes:
          type: array
          items:
            type: string
          description: Opaque reason strings attached to this control evaluation.

    RuntimeDatasetLineageRef:
      type: object
      description: |
        Dataset lineage fingerprint for runtime evaluate (Phase 3 M7.3).

        Metadata only on the HTTP surface; lineage rule outcomes live in **`governance_summary`** and may become blocking only for **`risk_class`** **`HIGH`** under allowlisted **`enforced`** (see **`governance_summary.enforced`**). **`risk_class`** and lineage controls are suppressed when **`GOVAI_RUNTIME_GOVERNANCE_ENFORCEMENT=off`**.
      additionalProperties: false
      required:
        - dataset_id
        - dataset_digest
      properties:
        dataset_id:
          type: string
          description: Stable dataset identifier for lineage (opaque; non-empty).
          minLength: 1
        dataset_digest:
          type: string
          description: SHA-256 digest of the referenced dataset fingerprint (same format rules as artifact digests).
          pattern: "^(sha256:)?[A-Fa-f0-9]{64}$"

    RuntimeOverrideRef:
      type: object
      description: |
        Human override pointer for runtime evaluate (Phase 3 M7.4). Shadow/metadata only — validated and echoed in
        the HTTP response and ledger `governance_enrichment`; does **not** authorize bypass, alter verdict, or enable
        enforcement. RBAC / separation-of-duties on overrides remain future work.
      additionalProperties: false
      required:
        - override_id
        - target_decision_id
      properties:
        override_id:
          type: string
          description: Opaque human-override record identifier (non-empty after server trim).
          minLength: 1
        target_decision_id:
          type: string
          description: |
            Must match the generated `decision_id` for this evaluate response, or the correlation-derived runtime run
            id `runtime_<correlation_id>` for the same request.
          minLength: 1

    RuntimeAgentContext:
      type: object
      description: |
        Phase 4 M1 optional agent identity metadata for runtime evaluate and `runtime_decision` ledger enrichment.
        Omitted JSON keys mean “not supplied”; echoed keys are trimmed to non-empty strings. **Additive only** —
        does **not** change verdict semantics, governance enforcement merges, **`GET /compliance-summary`**, tenant
        resolution, or policy evaluation.
      additionalProperties: false
      properties:
        agent_id:
          type: string
          description: Governed software actor identifier (opaque; non-empty after server trim).
          minLength: 1
        principal_id:
          type: string
          description: IAM / authorization subject identifier (opaque; non-empty after server trim).
          minLength: 1
        delegation_id:
          type: string
          description: Active delegation grant identifier (opaque; non-empty after server trim).
          minLength: 1
        capability_id:
          type: string
          description: Versioned capability / action-class identifier (opaque; non-empty after server trim).
          minLength: 1

    RuntimeDelegationContext:
      type: object
      description: |
        Phase 4 M2 optional delegation edge metadata for runtime evaluate and `runtime_decision` ledger enrichment.
        When present, **`delegation_id`** is required (non-empty after trim). Other fields are optional opaque strings
        (**`expires_at`** is RFC3339-like text only; not parsed server-side in M2). **Additive only** — does **not**
        change verdict semantics, governance enforcement, **`GET /compliance-summary`**, tenant resolution, or policy
        evaluation.
      additionalProperties: false
      required:
        - delegation_id
      properties:
        delegation_id:
          type: string
          description: Delegation grant identifier for this step (opaque; non-empty after server trim).
          minLength: 1
        parent_delegation_id:
          type: string
          description: Parent delegation in a chain (opaque; non-empty after server trim when provided).
          minLength: 1
        delegator_agent_id:
          type: string
          description: Upstream agent on the delegation edge (opaque; non-empty after server trim when provided).
          minLength: 1
        delegatee_agent_id:
          type: string
          description: Downstream agent on the delegation edge (opaque; non-empty after server trim when provided).
          minLength: 1
        delegated_capability_id:
          type: string
          description: Capability/class delegated on this edge (opaque; non-empty after server trim when provided).
          minLength: 1
        delegation_scope:
          type: string
          description: Client-defined scope label (opaque; non-empty after server trim when provided).
          minLength: 1
        expires_at:
          type: string
          description: Expiry timestamp as opaque client text (RFC3339-like; non-empty after trim when provided; not validated as a timestamp in M2).
          minLength: 1

    RuntimeEvaluateRequest:
      type: object
      required: [correlation_id, action]
      additionalProperties: false
      properties:
        correlation_id:
          type: string
          description: Client-provided correlation id for the runtime request.
        action:
          type: string
          description: Runtime action being governed (e.g. "llm.generate", "tool.call").
        artifact_digest:
          type: string
          description: SHA-256 digest for the artifact/model (format validation only; not attestation).
          pattern: "^(sha256:)?[A-Fa-f0-9]{64}$"
        model_digest:
          type: string
          description: Optional SHA-256 digest for the model (format validation only; not attestation).
          pattern: "^(sha256:)?[A-Fa-f0-9]{64}$"
        deployment_digest:
          type: string
          description: Optional SHA-256 digest for the deployment configuration (format validation only; not attestation).
          pattern: "^(sha256:)?[A-Fa-f0-9]{64}$"
        trace_id:
          type: string
          description: Optional trace identifier (metadata only).
        request_fingerprint:
          type: string
          description: Optional request fingerprint (metadata only; no raw user content).
        dataset_lineage_refs:
          type: array
          description: |
            Optional lineage references (Phase 3 M7.3). Omitted or `null` is treated as an empty array.
            Validated metadata; enforcement semantics depend on **`GOVAI_RUNTIME_GOVERNANCE_ENFORCEMENT`** + **`risk_class`** (HIGH lineage gate summary only when enforcement is **`shadow`**/**`enforced`**, blocking only allowlisted **`enforced`** — see **`governance_summary`**).
          items:
            $ref: "#/components/schemas/RuntimeDatasetLineageRef"
        risk_class:
          type: string
          description: >-
            Dataset risk tier (`MINIMAL` | `LIMITED` | `HIGH` | `PROHIBITED`; serde accepts canonical enum spellings — see Rust `RuntimeRiskClass`).
            Defaults internally to **`LIMITED`** when omitted. **`HIGH`** with empty lineage can surface **`dataset_lineage_required`** in **`governance_summary`**
            (warning vs blocking depends on **`governance_summary.enforced`** and global enforcement mode — see **`governance_summary`**).
          enum: [MINIMAL, LIMITED, HIGH, PROHIBITED]
        override_ref:
          nullable: true
          description: |
            Optional human override reference (Phase 3 M7.4). Omitted or `null` yields `null` in the response.
            Shadow metadata only; does not authorize bypass.
          allOf:
            - $ref: "#/components/schemas/RuntimeOverrideRef"
        agent_context:
          nullable: true
          description: |
            Optional Phase 4 M1 agent identity metadata (`null`/omitted/`{}` ⇒ `null` in responses); present fields must be
            non-empty after trim or the server returns **`400`** `VALIDATION_ERROR`.
          allOf:
            - $ref: "#/components/schemas/RuntimeAgentContext"
        delegation_context:
          nullable: true
          description: |
            Optional Phase 4 M2 delegation graph trace metadata (`null`/omitted ⇒ `null` in responses). When present,
            **`delegation_id`** must be non-empty after trim; optional string fields, if present, must be non-empty after trim
            or the server returns **`400`** `VALIDATION_ERROR`.
          allOf:
            - $ref: "#/components/schemas/RuntimeDelegationContext"

    RuntimeGovernanceSummary:
      type: object
      additionalProperties: false
      description: |
        Aggregated governance overlay (Phase 3 M7.8). Mirrors ledger **`payload.governance_enrichment.governance_summary`**.
        Top-level HTTP **`verdict`** may diverge from core **`GOVAI_RUNTIME_EVALUATE`** previews only when **`enforced`** is true and runtime mode is **`shadow`**. **`disabled`** mode (**`runtime_not_enabled`**) still pins **`BLOCKED`** independently of governance overlays.

        **`advisory_control_evaluations`** (Phase 4 M3) holds **shadow-only** capability consistency checks (**`source: capability_shadow`**). They are **not** merged into **`control_evaluations`**, do **not** influence **`verdict`** or HTTP **`enforcement`**, and never apply hard blocks.
      required:
        - verdict
        - reason_codes
        - control_evaluations
        - advisory_control_evaluations
        - dataset_lineage_refs
        - override_ref
        - agent_context
        - delegation_context
        - risk_class
        - enforcement_mode
        - enforced
      properties:
        verdict:
          type: string
          enum: [VALID, INVALID, BLOCKED]
        reason_codes:
          type: array
          items:
            type: string
        control_evaluations:
          type: array
          description: |
            Merged runtime governance controls (stub **`runtime_mode`** rows plus lineage / context / reason-mapping sentinels when applicable). **Advisory-only** capability shadow rows (**Phase 4 M3**) live in **`advisory_control_evaluations`**, not here.
          items:
            $ref: "#/components/schemas/RuntimeControlEvaluation"
        advisory_control_evaluations:
          type: array
          description: |
            Phase 4 M3 **shadow-only** capability policy checks (**`source: capability_shadow`**). PASS/WARN findings from declared **`agent_context.capability_id`**, **`delegation_context.delegated_capability_id`**, and **`action`** metadata; **never** affects top-level **`verdict`** or enforcement.
          items:
            $ref: "#/components/schemas/RuntimeControlEvaluation"
        dataset_lineage_refs:
          type: array
          items:
            $ref: "#/components/schemas/RuntimeDatasetLineageRef"
        override_ref:
          nullable: true
          description: |
            Echo/metadata only (**M7.4**). Does **not** authorize bypass regardless of **`enforced`**.
          allOf:
            - $ref: "#/components/schemas/RuntimeOverrideRef"
        agent_context:
          nullable: true
          description: |
            Echo of normalized request **`agent_context`**, or `null` (Phase 4 M1). Metadata only — identical to HTTP
            top-level **`agent_context`** for the same evaluate response (and mirrored under ledger
            **`payload.governance_enrichment.agent_context`**).
          allOf:
            - $ref: "#/components/schemas/RuntimeAgentContext"
        delegation_context:
          nullable: true
          description: |
            Echo of normalized request **`delegation_context`**, or `null` (Phase 4 M2). Metadata only — identical to HTTP
            top-level **`delegation_context`** (and mirrored under ledger **`payload.governance_enrichment.delegation_context`**).
          allOf:
            - $ref: "#/components/schemas/RuntimeDelegationContext"
        risk_class:
          type: string
          enum: [MINIMAL, LIMITED, HIGH, PROHIBITED]
        enforcement_mode:
          type: string
          enum: [off, shadow, enforced]
          description: Parsed **`GOVAI_RUNTIME_GOVERNANCE_ENFORCEMENT`** (normalized; missing/unknown → **`off`**).
        enforced:
          type: boolean
          description: |
            True when global enforcement is **`enforced`** **and** the ledger tenant appears in **`GOVAI_RUNTIME_GOVERNANCE_ENFORCEMENT_TENANTS`**.

    RuntimeEvaluateResponse:
      type: object
      required:
        - schema_version
        - governance_context_version
        - control_evaluations
        - dataset_lineage_refs
        - override_ref
        - ai_act_requirement_refs
        - policy_bundle_version
        - enforcement
        - governance_summary
        - preview
        - mode
        - verdict
        - reason_codes
        - correlation_id
        - decision_id
        - agent_context
        - delegation_context
      additionalProperties: false
      properties:
        schema_version:
          type: string
          enum: ["runtime.evaluate.response.v1"]
          description: Response schema discriminator for runtime evaluate (Phase 3 M7.1 additive enrichment).
        governance_context_version:
          type: string
          enum: ["runtime.governance.context.v1"]
          description: Governance context schema version; top-level **`control_evaluations`** are stub **`runtime_mode`** rows; merged evaluations also appear under **`governance_summary`** (M7.8).
        preview:
          type: boolean
          enum: [true]
          description: Always true for the runtime preview surface.
        mode:
          type: string
          enum: [disabled, shadow]
          description: |
            Core **`GOVAI_RUNTIME_EVALUATE`** mode:
            - `disabled`: fail-closed (`BLOCKED` + `runtime_not_enabled`)
            - `shadow`: preview; governance overlays may elevate **`INVALID`/`BLOCKED`** only under allowlisted **`enforced`** (see **`enforcement`** + **`governance_summary.enforced`**)
        verdict:
          type: string
          description: |
            Effective HTTP verdict (**`GOVAI_RUNTIME_EVALUATE`** core plus optional M7.8 governance elevations when **`governance_summary.enforced`**).
          enum: [VALID, INVALID, BLOCKED]
        reason_codes:
          type: array
          items:
            type: string
        correlation_id:
          type: string
        decision_id:
          type: string
        control_evaluations:
          type: array
          description: |
            Stub control-level evaluations (**`source: runtime_mode`**, Phase 3 M7.2). Derived governance overlays (lineage/context/mapping) live in **`governance_summary.control_evaluations`** alongside these rows after merge semantics.
          items:
            $ref: "#/components/schemas/RuntimeControlEvaluation"
        dataset_lineage_refs:
          type: array
          description: |
            Echo of validated lineage references supplied on the request, or empty (Phase 3 M7.3).
          items:
            $ref: "#/components/schemas/RuntimeDatasetLineageRef"
        override_ref:
          nullable: true
          description: |
            Echo of validated `override_ref` from the request, or `null` when omitted/`null` (Phase 3 M7.4). Shadow metadata only — **cannot** authorize bypass.
          allOf:
            - $ref: "#/components/schemas/RuntimeOverrideRef"
        agent_context:
          nullable: true
          description: |
            Echo of normalized `agent_context` from the request, or `null` when omitted, `null`, or effectively empty (**Phase 4 M1**). Duplicated inside **`governance_summary.agent_context`**. Ledger **`payload.governance_enrichment.agent_context`** matches this value (**`schema_version` unchanged**).
          allOf:
            - $ref: "#/components/schemas/RuntimeAgentContext"
        delegation_context:
          nullable: true
          description: |
            Echo of normalized `delegation_context` from the request, or `null` when omitted or `null` (**Phase 4 M2**).
            Duplicated inside **`governance_summary.delegation_context`**. Ledger **`payload.governance_enrichment.delegation_context`** matches this value (**`schema_version` unchanged**).
          allOf:
            - $ref: "#/components/schemas/RuntimeDelegationContext"
        ai_act_requirement_refs:
          type: array
          description: Placeholder AI Act requirement references (empty until mapped).
          items:
            type: string
        policy_bundle_version:
          type: string
          description: Active policy bundle version (or deployment policy_version fallback).
        enforcement:
          type: string
          enum: [off, shadow, enforced]
          description: |
            Tenant-visible enforcement hint. Values **`off`** / **`shadow`** / **`enforced`** replace legacy **`none`**. When **`GOVAI_RUNTIME_GOVERNANCE_ENFORCEMENT=enforced`** but the ledger tenant id is absent from **`GOVAI_RUNTIME_GOVERNANCE_ENFORCEMENT_TENANTS`**, implementations report **`shadow`** here (**non-blocking** relative to **`enforced`** elevations).
        governance_summary:
          $ref: "#/components/schemas/RuntimeGovernanceSummary"

