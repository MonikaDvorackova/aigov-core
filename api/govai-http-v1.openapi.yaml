openapi: 3.0.3
info:
  title: GovAI Audit HTTP API
  version: 1.0.0
  description: |
    # GovAI HTTP API — frozen contract (v1)

    ## API version

    This document defines **API major version 1** for the Rust `aigov_audit` binary.

    - **Implicit v1:** There is **no** `/v1/` path prefix for the core stable surface. All non-`/v1/...` paths below are v1.
    - **Preview namespace exception:** `/v1/runtime/*` is a **preview/runtime** namespace within the same major API version. It is explicitly prefixed to keep the preview surface clearly separated from the frozen core contract.
    - **Breaking changes** (when they become necessary) require either a **new major API version** (e.g. v2) with an explicit **`/v2/...` namespace** (or another explicitly documented version mechanism), or a coordinated major product release that documents migration. Clients MUST NOT assume new paths appear without a version bump story in this repository.

    ## Stability classification (`x-govai-surface`)

    Every operation is tagged:

    - **`stable`:** Safe for long-term external integration; backward-compatible evolution follows the rules below.
    - **`internal`:** Operational / diagnostic only; **not** part of the externally supported contract. May change with less notice (still not redesigned in patch releases without cause).
    - **`deprecated`:** Still callable; scheduled for removal per **Deprecation policy** (none are deprecated today).

    **Core stable surface (ledger + reads):** `GET /health`, `GET /status`, `POST /evidence`, `GET /usage`, `GET /verify`, `GET /verify-log`, `GET /bundle`, `GET /bundle-hash`, `GET /compliance-summary`, `GET /api/export/{run_id}`.
    **Commercial metadata (stable):** `GET /pricing` (plans + usage units; no payments).

    **Enterprise stable surface (Supabase JWT + Postgres):** `GET /api/me`, `POST /api/assessments`, all `/api/compliance-workflow*` routes, **`/api/ai-decision-traces*`** (append-only AI flight recorder), and **`/api/functions/v2/*`** (GovAI Functions 2.0 decision intelligence read APIs) are **`stable`** as a single tier. Rationale: the published **`govai` CLI** uses `POST /api/assessments` (`create-assessment`); the same product installation documents `GET /api/me` and workflow routes for demos and dashboards. Per project rule, enterprise routes are **all stable** or **all internal** — because the CLI depends on assessments, the **entire enterprise group is stable**.

    **Internal only:** `GET /` (service banner), `GET /ready` (operational readiness + Phase 3 diagnostics), `GET /metrics` (Prometheus exposition for operators), and the preview namespace under `/v1/runtime/*`.

    ## Breaking vs non-breaking changes (v1)

    **Breaking (requires new major version or `/v2/...` as above):**

    - Removing or renaming an endpoint or operation.
    - Changing the HTTP method for an existing path.
    - Adding a **required** header, query parameter, or request body field without a new major version.
    - Removing a response field that v1 marked **required** for success responses, or renaming it.
    - Changing JSON **types** or documented **semantics** of a stable field.
    - Changing HTTP status code **meaning** for the same client-visible outcome in a way that breaks existing clients.

    **Non-breaking:**

    - Adding **optional** request or response fields.
    - Adding **optional** query parameters.
    - Adding new endpoints (additive).
    - Stricter validation that maps to existing 4xx patterns where clients already handle errors.
    - Documentation fixes that align text with server behavior.

    ## Deprecation policy

    When an endpoint or field is deprecated:

    1. Set OpenAPI `deprecated: true` on the operation or property.
    2. Optionally set extension **`x-govai-deprecation-date`** (`YYYY-MM-DD`) for the earliest removal date.
    3. **Removal window:** A deprecated stable endpoint MUST remain **fully functional** until **at least one full major API version cycle** (e.g. until v2 is published and documented) **or** until the date given in `x-govai-deprecation-date`, whichever provides integrators **more** notice when both apply.
    4. No stable endpoint is deprecated in v1.0.0 of this document.

    ## Authentication (summary)

    - **Audit API keys (tenant isolation):** The ledger is isolated by **API key → tenant mapping**. Each request uses `Authorization: Bearer <secret>` to resolve the **ledger tenant**; all reads/writes are scoped to that tenant.
      - **Hosted / multi-tenant:** Configure `GOVAI_API_KEYS_JSON` to map API keys to tenant identifiers.
      - **Dev / simple:** `GOVAI_API_KEYS` can be used as a single-tenant or local development shortcut.
      - **Project label header:** `X-GovAI-Project` is **optional metadata only** (usage/billing attribution label) and **does not determine the tenant**.
    - **Supabase JWT:** `/api/me`, `/api/assessments`, `/api/compliance-workflow*` require `Authorization: Bearer <JWT>` and JWKS (`SUPABASE_URL`, optional `SUPABASE_JWT_AUD`). Optional `x-govai-team-id` for team scope.

servers:
  - url: http://127.0.0.1:8088
    description: Default bind (`AIGOV_BIND` overrides)

tags:
  - name: CoreMetadata
  - name: CoreLedger
  - name: CoreBilling
  - name: Enterprise
  - name: RuntimePreview

paths:
  /:
    get:
      tags: [CoreMetadata]
      summary: Service root
      operationId: getRoot
      x-govai-surface: internal
      security: []
      responses:
        "200":
          description: Service identity (not required for integrations).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RootResponse"

  /health:
    get:
      tags: [CoreMetadata]
      summary: Liveness
      operationId: getHealth
      x-govai-surface: stable
      security: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /metrics:
    get:
      tags: [CoreMetadata]
      summary: Prometheus metrics exposition
      operationId: getMetrics
      x-govai-surface: internal
      description: |
        Prometheus text format (0.0.4). Intended for operator scrapers; does not include secrets or tenant-private payloads.
      security: []
      responses:
        "200":
          description: Prometheus text
          content:
            text/plain:
              schema:
                type: string

  /ready:
    get:
      tags: [CoreMetadata]
      summary: Operational readiness (Postgres + migrations + ledger)
      operationId: getReady
      x-govai-surface: internal
      description: |
        Verifies database connectivity, applied SQLx migrations, writable ledger (`GOVAI_LEDGER_DIR` or dev cwd), and a tenant-scoped ledger append probe.

        Success responses include **`runtime_governance_enforcement`** diagnostics (Phase 3). These fields are **informational**: readiness HTTP **`200`** is **not** conditioned on **`enforceable`** — use them only for rollout / operator dashboards.
      security: []
      responses:
        "200":
          description: Ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadyResponseOk"
        "503":
          description: Dependency missing (`NOT_READY`). Body follows **`rust/src/api_error.rs`**: **`{"ok": false, "error": {"code","message","hint","details"?}}`** ( **`details`** may include **`checks`** booleans ).
          content:
            application/json:
              schema:
                type: object
                description: Standard audit API error envelope; see **`ApiError`** in `rust/src/api_error.rs`.

  /status:
    get:
      tags: [CoreMetadata]
      summary: Policy version and deployment tier
      operationId: getStatus
      x-govai-surface: stable
      security: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"

  /pricing:
    get:
      tags: [CoreMetadata]
      summary: Get pricing plans
      operationId: getPricing
      x-govai-surface: stable
      security: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PricingResponse"

  /evidence:
    post:
      tags: [CoreLedger]
      summary: Ingest one evidence event
      operationId: postEvidence
      x-govai-surface: stable
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EvidenceEvent"
      responses:
        "200":
          description: Appended (shape depends on metering mode).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EvidenceIngestSuccess"
        "400":
          description: Validation / policy / tenant error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EvidenceIngestError"
        "401":
          description: Unauthorized (API keys enforced)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SimpleOkFalse"
        "403":
          description: Forbidden (e.g. team not configured for key)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EvidenceIngestError"
        "409":
          description: Duplicate event_id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EvidenceIngestError"
        "429":
          description: Quota / metering limits
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EvidenceIngestError"
        "500":
          description: Append or metering persistence failure
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EvidenceIngestError"

  /usage:
    get:
      tags: [CoreLedger]
      summary: Usage and limits
      operationId: getUsage
      x-govai-surface: stable
      security:
        - bearerAuth: []
      parameters:
        - name: X-GovAI-Project
          in: header
          required: false
          schema:
            type: string
          description: Optional metadata label for usage/billing attribution only. This header does **not** determine the ledger tenant (tenant isolation is based on API key → tenant mapping).
      responses:
        "200":
          description: Success (no top-level `ok` field in current implementation).
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/UsageMeteringOff"
                  - $ref: "#/components/schemas/UsageMeteringOn"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SimpleOkFalse"
        "403":
          description: Team not configured for API key (metering on)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SimpleOkFalse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UsageError"

  /billing/status:
    get:
      tags: [CoreBilling]
      summary: Hosted Stripe billing status
      operationId: getBillingStatus
      x-govai-surface: stable
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Billing snapshot for ledger tenant from API key
          content:
            application/json:
              schema:
                type: object
        "401":
          description: Unauthorized

  /billing/checkout-session:
    post:
      tags: [CoreBilling]
      summary: Create Stripe Checkout session (subscription)
      operationId: postBillingCheckoutSession
      x-govai-surface: stable
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [success_url, cancel_url]
              properties:
                success_url:
                  type: string
                cancel_url:
                  type: string
      responses:
        "200":
          description: Checkout session created
        "502":
          description: Stripe error

  /billing/report-usage:
    post:
      tags: [CoreBilling]
      summary: Report metered usage to Stripe for current billing period
      operationId: postBillingReportUsage
      x-govai-surface: stable
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                billing_unit:
                  type: string
                  description: evidence_event (default), compliance_check, audit_export, discovery_scan
      responses:
        "200":
          description: Usage recorded or idempotent hit

  /v1/runtime/evaluate:
    post:
      tags: [RuntimePreview]
      summary: Runtime governance evaluation (preview)
      operationId: postV1RuntimeEvaluate
      x-govai-surface: internal
      description: |
        Preview endpoint for runtime governance checks (Phase 3 M7.x).

        - **Fail-closed core runtime modes:** unless **`GOVAI_RUNTIME_EVALUATE`** shadow mode applies, defaults return `BLOCKED` with reason code **`runtime_not_enabled`**.
        - **Opt-in governance enforcement (M7.8):** **`GOVAI_RUNTIME_GOVERNANCE_ENFORCEMENT`** (**`off`** default, **`shadow`**, **`enforced`**) can compute **`governance_summary`** overlays. Hard blocking elevations into top-level **`verdict`** apply only when the mode resolves to **`enforced`** **and** the ledger tenant appears in **`GOVAI_RUNTIME_GOVERNANCE_ENFORCEMENT_TENANTS`**. **`off`** preserves legacy **`GOVAI_RUNTIME_EVALUATE`** disabled/shadow **`verdict`** semantics; **`shadow`** governance never overrides top-level **`verdict`** on its own.
        - **`compliance-summary` unchanged:** this route does **not** modify **`GET /compliance-summary`**.
        - **Platform gate precedence:** protected by audit platform gates (auth, billing, rate limiting); may return **`401`**, **`403`**, **`429`** **before** any runtime verdict.
        - **Tenant isolation:** resolved from API key mapping (never from optional project headers alone).
        - **Audit recorded:** appends **`runtime_decision`** with **`governance_enrichment`** mirrors.
        - **No raw user content:** metadata + digests/fingerprints only.
        - **Digest format validation (not attestation):** digest fields validated as SHA-256 token shapes only.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RuntimeEvaluateRequest"
      responses:
        "200":
          description: Decision returned (stub)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuntimeEvaluateResponse"
        "400":
          description: Validation / tenant error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SimpleOkFalse"
        "401":
          description: Unauthorized (API keys enforced)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SimpleOkFalse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SimpleOkFalse"

  /billing/portal-session:
    post:
      tags: [CoreBilling]
      summary: Create Stripe Billing Portal session
      operationId: postBillingPortalSession
      x-govai-surface: stable
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [return_url]
              properties:
                return_url:
                  type: string
      responses:
        "200":
          description: Portal URL returned
        "404":
          description: No Stripe customer (BILLING_ACCOUNT_NOT_FOUND)

  /billing/invoices:
    get:
      tags: [CoreBilling]
      summary: List recent Stripe invoices for tenant customer
      operationId: getBillingInvoices
      x-govai-surface: stable
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Invoice list

  /billing/reconciliation:
    get:
      tags: [CoreBilling]
      summary: Usage reconciliation with run-level attribution
      operationId: getBillingReconciliation
      x-govai-surface: stable
      security:
        - bearerAuth: []
      parameters:
        - name: from
          in: query
          required: true
          schema:
            type: string
        - name: to
          in: query
          required: true
          schema:
            type: string
        - name: billing_unit
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Reconciliation payload

  /stripe/webhook:
    post:
      tags: [CoreBilling]
      summary: Stripe webhook receiver
      operationId: postStripeWebhook
      x-govai-surface: internal
      security: []
      responses:
        "200":
          description: Event accepted (or duplicate ignored)

  /verify:
    get:
      tags: [CoreLedger]
      summary: Verify full append-only hash chain
      operationId: getVerify
      x-govai-surface: stable
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Valid or invalid chain (both use HTTP 200; inspect `ok`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VerifyResponse"
        "400":
          description: Bad request (e.g. tenant resolution)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VerifyBadRequest"

  /verify-log:
    get:
      tags: [CoreLedger]
      summary: Compact chain check (plaintext JSON body)
      operationId: getVerifyLog
      x-govai-surface: stable
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Chain OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VerifyLogOk"
        "400":
          description: Bad request (e.g. missing tenant context)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VerifyLogError"
        "401":
          description: Unauthorized (API keys enforced)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SimpleOkFalse"
        "500":
          description: Chain or checkpoint verification failure
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VerifyLogError"

  /bundle:
    get:
      tags: [CoreLedger]
      summary: Bundle document for a run
      operationId: getBundle
      x-govai-surface: stable
      security:
        - bearerAuth: []
      parameters:
        - name: run_id
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Success bundle or logical error (`ok:false` still HTTP 200).
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/BundleDocumentSuccess"
                  - $ref: "#/components/schemas/BundleDocumentError"

  /bundle-hash:
    get:
      tags: [CoreLedger]
      summary: Canonical bundle SHA-256
      operationId: getBundleHash
      x-govai-surface: stable
      security:
        - bearerAuth: []
      parameters:
        - name: run_id
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Digest
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BundleHashSuccess"
        "400":
          description: Bad request (e.g. missing tenant context)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BundleDocumentError"
        "401":
          description: Unauthorized (API keys enforced)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SimpleOkFalse"
        "404":
          description: Run not found in tenant ledger
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BundleDocumentError"
        "503":
          description: Bundle not available (transient)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BundleDocumentError"

  /compliance-summary:
    get:
      tags: [CoreLedger]
      summary: Compliance summary for a run
      operationId: getComplianceSummary
      x-govai-surface: stable
      security:
        - bearerAuth: []
      parameters:
        - name: run_id
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Summary (HTTP 200 for both `ok` true and false).
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/ComplianceSummarySuccess"
                  - $ref: "#/components/schemas/ComplianceSummaryError"
        "400":
          description: Tenant resolution failure
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ComplianceSummaryBadRequest"
        "401":
          description: Unauthorized (API keys enforced)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SimpleOkFalse"
        "429":
          description: Per-API-key request cap exceeded (`GOVAI_API_KEYS` entry limit)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EvidenceIngestError"

  /api/export/{run_id}:
    get:
      tags: [CoreLedger]
      summary: Machine-readable audit export
      operationId: getApiExportRunId
      x-govai-surface: stable
      security:
        - bearerAuth: []
      parameters:
        - name: run_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Export document
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditExportSuccess"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditExportError"
        "404":
          description: Run has no events in ledger
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditExportError"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditExportError"

  /api/me:
    get:
      tags: [Enterprise]
      summary: Current user and teams
      operationId: getApiMe
      x-govai-surface: stable
      security:
        - supabaseJWT: []
      parameters:
        - name: x-govai-team-id
          in: header
          required: false
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MeResponse"
        "401":
          description: Unauthorized
        "500":
          description: Configuration or database error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnterpriseError"

  /api/assessments:
    post:
      tags: [Enterprise]
      summary: Create assessment
      operationId: postApiAssessments
      x-govai-surface: stable
      security:
        - supabaseJWT: []
      parameters:
        - name: x-govai-team-id
          in: header
          required: false
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAssessmentBody"
      responses:
        "200":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssessmentOut"
        "400":
          description: Invalid team header
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnterpriseError"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnterpriseForbidden"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnterpriseError"

  /api/compliance-workflow:
    get:
      tags: [Enterprise]
      summary: List workflow rows
      operationId: getApiComplianceWorkflow
      x-govai-surface: stable
      security:
        - supabaseJWT: []
      parameters:
        - name: state
          in: query
          required: false
          schema:
            type: string
        - name: x-govai-team-id
          in: header
          required: false
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkflowListResponse"
        "403":
          description: Insufficient permission
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnterpriseForbidden"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnterpriseError"
    post:
      tags: [Enterprise]
      summary: Register run in workflow queue
      operationId: postApiComplianceWorkflow
      x-govai-surface: stable
      security:
        - supabaseJWT: []
      parameters:
        - name: x-govai-team-id
          in: header
          required: false
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterWorkflowBody"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkflowSingleResponse"
        "400":
          description: Missing run_id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnterpriseError"
        "403":
          description: Insufficient permission
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnterpriseForbidden"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnterpriseError"

  /api/compliance-workflow/{run_id}:
    get:
      tags: [Enterprise]
      summary: Get one workflow row
      operationId: getApiComplianceWorkflowRunId
      x-govai-surface: stable
      security:
        - supabaseJWT: []
      parameters:
        - name: run_id
          in: path
          required: true
          schema:
            type: string
        - name: x-govai-team-id
          in: header
          required: false
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
