apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "aigov-core.fullname" . }}
  labels:
    {{- include "aigov-core.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "aigov-core.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "aigov-core.selectorLabels" . | nindent 8 }}
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
          envFrom:
            - configMapRef:
                name: {{ include "aigov-core.fullname" . }}
            {{- if or .Values.secrets.DATABASE_URL .Values.secrets.GOVAI_API_KEYS .Values.secrets.GOVAI_API_KEYS_JSON }}
            - secretRef:
                name: {{ include "aigov-core.fullname" . }}
            {{- end }}
          {{- if .Values.persistence.enabled }}
          volumeMounts:
            - name: ledger
              mountPath: {{ .Values.persistence.mountPath }}
          {{- end }}
          livenessProbe:
            httpGet:
              path: {{ .Values.probes.liveness.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
          readinessProbe:
            httpGet:
              path: {{ .Values.probes.readiness.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- if .Values.persistence.enabled }}
      volumes:
        - name: ledger
          persistentVolumeClaim:
            claimName: {{ include "aigov-core.fullname" . }}-ledger
      {{- end }}
