{{- if or .Values.secrets.DATABASE_URL .Values.secrets.GOVAI_API_KEYS .Values.secrets.GOVAI_API_KEYS_JSON }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "aigov-core.fullname" . }}
  labels:
    {{- include "aigov-core.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- if .Values.secrets.DATABASE_URL }}
  DATABASE_URL: {{ .Values.secrets.DATABASE_URL | quote }}
  {{- end }}
  {{- if .Values.secrets.GOVAI_API_KEYS }}
  GOVAI_API_KEYS: {{ .Values.secrets.GOVAI_API_KEYS | quote }}
  {{- end }}
  {{- if .Values.secrets.GOVAI_API_KEYS_JSON }}
  GOVAI_API_KEYS_JSON: {{ .Values.secrets.GOVAI_API_KEYS_JSON | quote }}
  {{- end }}
{{- end }}
