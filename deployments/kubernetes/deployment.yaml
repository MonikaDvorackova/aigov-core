# Single-replica default: append-only ledger is not multi-writer HA.
# Scale replicas only after externalizing ledger coordination (not implemented).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aigov-core
  namespace: aigov-core
  labels:
    app.kubernetes.io/name: aigov-core
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: aigov-core
  template:
    metadata:
      labels:
        app.kubernetes.io/name: aigov-core
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: aigov-core
          image: aigov-core:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8088
          envFrom:
            - configMapRef:
                name: aigov-core
            - secretRef:
                name: aigov-core
          volumeMounts:
            - name: ledger
              mountPath: /var/lib/govai/ledger
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "2"
              memory: 1Gi
      volumes:
        - name: ledger
          persistentVolumeClaim:
            claimName: govai-ledger
