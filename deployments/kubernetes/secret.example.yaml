# Example Secret — copy to secret.yaml, fill values, apply. Do not commit real secrets.
apiVersion: v1
kind: Secret
metadata:
  name: aigov-core
  namespace: aigov-core
  labels:
    app.kubernetes.io/name: aigov-core
type: Opaque
stringData:
  DATABASE_URL: "postgres://govai:CHANGE_ME@postgres.aigov-core.svc.cluster.local:5432/govai"
  GOVAI_API_KEYS: "operator-production-key"
  GOVAI_API_KEYS_JSON: '{"operator-production-key":"operator-tenant-1"}'
  # Optional: export signing key for signed evidence bundles (see docs/runtime-operations.md)
  # GOVAI_AUDIT_EXPORT_SIGNING_KEY: "base64-ed25519-seed"
