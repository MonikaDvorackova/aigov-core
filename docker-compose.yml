services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: govai
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - govai-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d govai"]
      interval: 5s
      timeout: 3s
      retries: 20

  govai-audit:
    build:
      context: ./rust
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
    environment:
      AIGOV_BIND: "0.0.0.0:8088"
      GOVAI_AUTO_MIGRATE: "true"
      DATABASE_URL: "postgres://postgres:postgres@db:5432/govai"
      # Optional but recommended even for operator-hosted:
      GOVAI_API_KEYS: "test-key"
      # GOVAI_BASE_URL: "http://localhost:8088"
    ports:
      - "8088:8088"

volumes:
  govai-postgres-data:
